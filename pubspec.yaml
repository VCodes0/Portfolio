name: vishnuprajapati

description: "Vishnu Prajapati — Flutter Developer Portfolio"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.9

dependencies:
  flutter:
    sdk: flutter

  # UI / Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  flutter_svg: ^2.0.10

  # Responsiveness
  responsive_framework: ^1.5.1

  # Animations
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0

  # Navigation & Scroll
  visibility_detector: ^0.4.0+2
  smooth_page_indicator: ^1.1.0

  # Utilities
  url_launcher: ^6.3.0
  universal_html: ^2.2.4
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  get: ^4.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/